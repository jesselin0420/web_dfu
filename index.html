<script>
let usbDevice = null;
let selectedFile = null;
let firmwareBytes = null; // 用來儲存最終要燒錄的純二進位資料 (Uint8Array)
let isRunning = false;

const webUsbSupported = typeof navigator !== 'undefined' && typeof navigator.usb !== 'undefined';

// DOM refs
const btnConnect      = document.getElementById('btnConnect');
const btnStart        = document.getElementById('btnStart');
const btnReset        = document.getElementById('btnReset');
const usbStateEl      = document.getElementById('usbState');
const deviceChip      = document.getElementById('deviceChip');
const deviceInfoEl    = document.getElementById('deviceInfo');
const errorBanner     = document.getElementById('errorBanner');
const errorTitle      = document.getElementById('errorTitle');
const errorMsg        = document.getElementById('errorMsg');
const fileInput       = document.getElementById('fileInput');
const dropZone        = document.getElementById('dropZone');
const fileRow         = document.getElementById('fileRow');
const fileNameEl      = document.getElementById('fileName');
const fileSizeEl      = document.getElementById('fileSize');
const infoCard        = document.getElementById('infoCard');
const statusBar       = document.getElementById('statusBar');
const statusDot       = document.getElementById('statusDot');
const statusMsg       = document.getElementById('statusMsg');
const progressSection = document.getElementById('progressSection');
const progressFill    = document.getElementById('progressFill');
const progressPct     = document.getElementById('progressPct');
const progressText    = document.getElementById('progressText');
const logBox          = document.getElementById('logBox');

// ── Helpers ────────────────────────────────────────────
function fmt(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

// 計算真實的 CRC-32 (IEEE 802.3 標準)
function calculateCRC32(uint8Array) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < uint8Array.length; i++) {
    let byte = uint8Array[i];
    crc ^= byte;
    for (let j = 0; j < 8; j++) {
      if (crc & 1) {
        crc = (crc >>> 1) ^ 0xEDB88320;
      } else {
        crc >>>= 1;
      }
    }
  }
  return '0x' + ((crc ^ 0xFFFFFFFF) >>> 0).toString(16).toUpperCase().padStart(8, '0');
}

// ── Intel HEX 轉 BIN 解析核心邏輯 ───────────────────────
function parseHexToBin(hexText) {
  const lines = hexText.split(/\r?\n/);
  let chunks = [];
  let minAddr = 0xFFFFFFFF;
  let maxAddr = 0;
  let extLinearAddr = 0;

  // 第一階段：解析所有資料紀錄並找出記憶體邊界
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();
    if (!line) continue;
    if (line[0] !== ':') throw new Error(`第 ${i+1} 行格式錯誤：缺少冒號`);

    const byteCount = parseInt(line.substr(1, 2), 16);
    const offset = parseInt(line.substr(3, 4), 16);
    const recordType = parseInt(line.substr(7, 2), 16);
    
    if (recordType === 0x00) { // Data Record
      const targetAddr = extLinearAddr + offset;
      const dataBytes = new Uint8Array(byteCount);
      for (let b = 0; b < byteCount; b++) {
        dataBytes[b] = parseInt(line.substr(9 + b * 2, 2), 16);
      }
      chunks.push({ addr: targetAddr, bytes: dataBytes });
      
      if (targetAddr < minAddr) minAddr = targetAddr;
      if (targetAddr + byteCount > maxAddr) maxAddr = targetAddr + byteCount;
    } else if (recordType === 0x04) { // Extended Linear Address Record
      extLinearAddr = parseInt(line.substr(9, 4), 16) << 16;
    } else if (recordType === 0x01) { // End of File Record
      break;
    }
  }

  if (chunks.length === 0) throw new Error("HEX 檔案中沒有找到任何有效的資料紀錄");

  // 第二階段：將散落的 chunks 填入連續的二進位陣列中（未填寫處填滿 0xFF）
  const binLength = maxAddr - minAddr;
  const binArray = new Uint8Array(binLength);
  binArray.fill(0xFF); 

  for (const chunk of chunks) {
    const position = chunk.addr - minAddr;
    binArray.set(chunk.bytes, position);
  }

  return { binArray, startAddr: minAddr };
}

function log(msg, type='plain') {
  const d = document.createElement('div');
  const ts = new Date().toLocaleTimeString('en-GB',{hour12:false});
  d.innerHTML = `<span class="log-ts">[${ts}]</span> <span class="log-${type}">${msg}</span>`;
  logBox.appendChild(d); logBox.scrollTop = logBox.scrollHeight;
}
function setStatus(cls, msg, pulse=false) {
  statusBar.className = 'status-bar status-' + cls;
  statusMsg.textContent = msg;
  statusDot.className = 'status-dot' + (pulse ? ' pulse' : '');
}
function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressPct.textContent = pct + '%';
  progressText.textContent = label;
}
function setStep(i, state) {
  const el = document.getElementById('step-'+i); if (!el) return;
  el.className = 'step ' + state;
  const dot = el.querySelector('.step-dot');
  if (state === 'done') dot.innerHTML = `<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  else dot.textContent = i+1;
}
function showError(title, msg) {
  errorTitle.textContent = title;
  errorMsg.textContent = msg;
  errorBanner.classList.add('visible');
}
function hideError() {
  errorBanner.classList.remove('visible');
}
function setUsbState(state, label) {
  usbStateEl.className = 'usb-state ' + state;
  const pulse = state === 'searching' ? ' pulse' : '';
  usbStateEl.innerHTML = `<span class="usb-dot${pulse}"></span> ${label}`;
}
function checkReady() {
  btnStart.disabled = !(usbDevice && firmwareBytes);
}

// ── WebUSB not supported ───────────────────────────────
if (!webUsbSupported) {
  btnConnect.disabled = true;
  btnConnect.textContent = 'Not supported';
  showError(
    'WebUSB not available',
    'This browser does not support WebUSB. Please use Google Chrome or Microsoft Edge (desktop). Safari and Firefox are not supported.'
  );
  log('WebUSB not available in this browser.', 'err');
  log('Use Chrome or Edge to connect a real device.', 'warn');
}

// ── Device disconnect event ────────────────────────────
if (webUsbSupported) {
  navigator.usb.addEventListener('disconnect', e => {
    if (usbDevice && e.device === usbDevice) {
      usbDevice = null;
      setUsbState('disconnected', 'No device');
      deviceChip.classList.remove('visible');
      btnConnect.textContent = 'Connect Device';
      btnConnect.className = 'btn-connect';
      log('Device disconnected.', 'err');
      setStatus('error', 'Device disconnected.');
      showError('Device disconnected', 'The USB device was unplugged. Reconnect and try again.');
      checkReady();
    }
  });
}

// ── Connect ────────────────────────────────────────────
btnConnect.addEventListener('click', async () => {
  if (!webUsbSupported) return;
  hideError();

  if (usbDevice) {
    try { await usbDevice.close(); } catch(e) {}
    usbDevice = null;
    setUsbState('disconnected', 'No device');
    deviceChip.classList.remove('visible');
    btnConnect.textContent = 'Connect Device';
    btnConnect.className = 'btn-connect';
    log('Device disconnected by user.', 'warn');
    setStatus('idle', 'Ready — connect a device to begin.');
    checkReady();
    return;
  }

  setUsbState('searching', 'Searching...');
  log('Opening USB device selector...', 'info');

  try {
    const device = await navigator.usb.requestDevice({
      filters: [
        { classCode: 0xFE, subclassCode: 0x01 }, 
        { vendorId: 0x0483 },  
        { vendorId: 0x1915 },  
        { vendorId: 0x2FE3 },  
        {}                     
      ]
    });

    await device.open();
    usbDevice = device;

    const name   = device.productName      || 'USB Device';
    const mfr    = device.manufacturerName ? device.manufacturerName + ' — ' : '';
    const serial = device.serialNumber     ? ' [S/N: ' + device.serialNumber + ']' : '';
    const vid    = '0x' + device.vendorId.toString(16).toUpperCase().padStart(4,'0');
    const pid    = '0x' + device.productId.toString(16).toUpperCase().padStart(4,'0');
    const label  = mfr + name + serial;

    setUsbState('connected', 'Connected');
    deviceChip.classList.add('visible');
    deviceInfoEl.textContent = label + '  VID:' + vid + '  PID:' + pid;
    btnConnect.textContent = 'Disconnect';
    btnConnect.className = 'btn-connect secondary';

    log('Device connected: ' + label, 'ok');
    log('VID: ' + vid + '  PID: ' + pid, 'info');
    setStatus('idle', 'Device ready. Select a firmware image to flash.');
    checkReady();

  } catch(err) {
    setUsbState('disconnected', 'No device');
    if (err.name === 'NotFoundError') {
      log('No device selected in picker.', 'warn');
    } else {
      showError('Connection failed', err.message);
      log('Connection error [' + err.name + ']: ' + err.message, 'err');
      setStatus('error', 'Connection failed.');
    }
  }
});

// ── File load & Auto Conversion ────────────────────────
function loadFile(file) {
  selectedFile = file;
  hideError();
  
  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();

  reader.onload = function(e) {
    try {
      if (ext === 'hex') {
        log('偵測到 Intel HEX 格式，正在轉換為純 Binary...', 'info');
        const text = e.target.result;
        const result = parseHexToBin(text);
        
        firmwareBytes = result.binArray;
        
        // 自動校正網頁上的起始地址欄位
        const detectedAddr = '0x' + result.startAddr.toString(16).toUpperCase().padStart(8, '0');
        document.getElementById('startAddr').value = detectedAddr;
        log(`轉換成功！自動偵測起始地址為: ${detectedAddr}`, 'ok');
      } else {
        // .bin 檔案直接轉成 Uint8Array
        firmwareBytes = new Uint8Array(e.target.result);
      }

      // 更新 UI 資訊
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = `${fmt(file.size)} (Bin 大小: ${fmt(firmwareBytes.length)})`;
      fileRow.classList.add('visible');
      infoCard.style.display = 'block';

      const pktSize = parseInt(document.getElementById('packetSize').value);
      const crc32Val = calculateCRC32(firmwareBytes);

      document.getElementById('infoSize').textContent = fmt(firmwareBytes.length);
      document.getElementById('infoPackets').textContent = Math.ceil(firmwareBytes.length / pktSize).toLocaleString();
      document.getElementById('infoFormat').textContent = ext.toUpperCase() + ' ➜ BIN';
      document.getElementById('infoCRC').textContent = crc32Val;

      log('Image 載入就緒: ' + file.name, 'ok');
      log('解算後 Binary 實體大小: ' + fmt(firmwareBytes.length), 'info');
      log('預計燒錄真實 CRC-32: ' + crc32Val, 'info');
      
      checkReady();
      if (!usbDevice) setStatus('idle', 'Image ready. Connect a USB device to flash.');
      else setStatus('idle', 'Ready to flash.');

    } catch(err) {
      showError('檔案解析失敗', err.message);
      log('解析失敗: ' + err.message, 'err');
      firmwareBytes = null;
      checkReady();
    }
  };

  if (ext === 'hex') {
    reader.readAsText(file); // HEX 是純文字
  } else {
    reader.readAsArrayBuffer(file); // 其他視為二進位
  }
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) loadFile(f);
});

// ── DFU start ──────────────────────────────────────────
btnStart.addEventListener('click', async () => {
  if (isRunning) return;
  if (!usbDevice) { showError('No device connected', 'Please connect a USB DFU device first.'); return; }
  if (!firmwareBytes) { showError('No firmware data', 'Please select a valid firmware file.'); return; }

  hideError();
  isRunning = true;
  btnStart.disabled = true;
  for (let i=0;i<5;i++) setStep(i,'');

  const mode    = document.getElementById('dfuMode').value;
  const addr    = document.getElementById('startAddr').value;
  const pktSize = parseInt(document.getElementById('packetSize').value);
  const verify  = document.getElementById('verifyChk').checked;
  const totalPkts = Math.ceil(firmwareBytes.length / pktSize);

  progressSection.classList.add('visible');
  setProgress(0, 'Starting...');
  log('--- DFU session started ---', 'info');
  log('Mode: ' + mode + ' | Address: ' + addr + ' | Packet size: ' + pktSize + 'B', 'info');
  log('Total packets: ' + totalPkts, 'info');

  // ── Step 1: Connect ──
  setStep(0,'active');
  setStatus('running', 'Verifying device connection...', true);
  setProgress(3, 'Connecting...');
  log('Device: ' + (usbDevice.productName||'USB Device') + ' VID:0x' + usbDevice.vendorId.toString(16).toUpperCase(), 'ok');

  // ── Step 2: Enter DFU ──
  setStep(0,'done'); setStep(1,'active');
  setProgress(7, 'Entering DFU mode...');
  setStatus('running', 'Sending DFU_DETACH...', true);
  try {
    if (usbDevice.configuration === null) await usbDevice.selectConfiguration(1);
    await usbDevice.claimInterface(0);
    await usbDevice.controlTransferOut({
      requestType:'class', recipient:'interface',
      request: 0x00, value: 1000, index: 0  
    });
    log('DFU_DETACH sent OK.', 'ok');
  } catch(e) {
    log('DFU_DETACH: ' + e.message + ' (may already be in DFU mode)', 'warn');
  }

  // ── Step 3: Erase ──
  setStep(1,'done'); setStep(2,'active');
  setProgress(11, 'Erasing flash...');
  setStatus('running', 'Erasing flash at ' + addr + '...', true);
  log('Erase → ' + addr, 'warn');
  try {
    const addrBytes = hexToLeBytes(addr, 4);
    await usbDevice.controlTransferOut({
      requestType:'class', recipient:'interface',
      request: 0x01, value: 0, index: 0   
    }, new Uint8Array([0x41, ...addrBytes]));
    await pollDfuStatus(usbDevice);
    log('Erase complete.', 'ok');
  } catch(e) {
    log('Erase error: ' + e.message, 'warn');
  }

  // ── Step 4: Download ──
  setStep(2,'done'); setStep(3,'active');
  setProgress(14, 'Downloading firmware...');
  setStatus('running', 'Downloading firmware...', true);
  log('Starting packet transfer...', 'info');

  let transferOk = true;
  for (let blk = 0; blk < totalPkts; blk++) {
    const chunk = firmwareBytes.slice(blk * pktSize, (blk+1) * pktSize);
    try {
      const result = await usbDevice.controlTransferOut({
        requestType:'class', recipient:'interface',
        request: 0x01, value: blk + 2, index: 0  
      }, chunk);
      if (result.status !== 'ok') throw new Error('Transfer status: ' + result.status);
    } catch(e) {
      log('Packet ' + blk + ' error: ' + e.message, 'err');
      showError('Transfer error at packet ' + blk, e.message);
      setStatus('error', 'Transfer failed at packet ' + blk + '.');
      transferOk = false; break;
    }
    const pct = Math.round(14 + ((blk+1)/totalPkts) * (verify ? 66 : 80));
    setProgress(pct, 'Packet ' + (blk+1) + ' / ' + totalPkts);
    if ((blk+1) % Math.max(1, Math.floor(totalPkts*0.2)) === 0 || blk+1 === totalPkts)
      log('Packet ' + (blk+1) + '/' + totalPkts + ' (' + pct + '%)', 'plain');
    await new Promise(r => setTimeout(r, 0)); 
  }

  if (!transferOk) { isRunning = false; checkReady(); return; }
  log('All packets transferred.', 'ok');

  // ── Step 5: Verify ──
  setStep(3,'done'); setStep(4,'active');
  if (verify) {
    setProgress(82, 'Verifying...');
    setStatus('running', 'Verifying firmware...', true);
    log('Requesting DFU_GETSTATUS...', 'info');
    try {
      const res = await usbDevice.controlTransferIn({
        requestType:'class', recipient:'interface',
        request: 0x03, value: 0, index: 0  
      }, 6);
      const st = new Uint8Array(res.data.buffer);
      log('DFU status bytes: ' + Array.from(st).map(b=>b.toString(16).padStart(2,'0')).join(' '), 'info');
      if (st[0] === 0x00) log('Status: OK (dfuOK)', 'ok');
      else log('Status code: 0x' + st[0].toString(16) + ' — check DFU spec', 'warn');
    } catch(e) {
      log('DFU_GETSTATUS error: ' + e.message, 'warn');
    }
    log('CRC-32 reference: ' + document.getElementById('infoCRC').textContent, 'ok');
    setProgress(98, 'Verification complete');
  }

  // ── Done ──
  setStep(4,'done');
  setProgress(100, 'Complete');
  setStatus('success', 'DFU download complete. Device rebooting...');
  log('--- DFU session finished successfully ---', 'ok');
  log('Device will reset and boot the new firmware.', 'info');
  try { await usbDevice.close(); } catch(e) {}
  log('USB connection closed.', 'plain');

  isRunning = false;
  btnStart.className = 'btn-start done';
  btnStart.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Done';
  btnStart.disabled = true;
});

// ── Poll DFU status ────────────────────────────────────
async function pollDfuStatus(device) {
  for (let i=0;i<15;i++) {
    await new Promise(r => setTimeout(r, 100));
    try {
      const res = await device.controlTransferIn({
        requestType:'class', recipient:'interface',
        request: 0x03, value: 0, index: 0
      }, 6);
      const st = new Uint8Array(res.data.buffer);
      if (st[4] === 0x02) return; 
    } catch(e) { break; }
  }
}

// ── Hex → little-endian bytes ──────────────────────────
function hexToLeBytes(hexStr, len) {
  const n = parseInt(hexStr, 16);
  return Array.from({length: len}, (_, i) => (n >> (8*i)) & 0xff);
}

// ── Reset ──────────────────────────────────────────────
btnReset.addEventListener('click', () => {
  isRunning = false;
  selectedFile = null;
  firmwareBytes = null;
  fileInput.value = '';
  fileRow.classList.remove('visible');
  infoCard.style.display = 'none';
  progressSection.classList.remove('visible');
  progressFill.style.width = '0%';
  btnStart.disabled = true;
  btnStart.className = 'btn-start';
  btnStart.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="3" x2="12" y2="21"/></svg> Start DFU Download';
  hideError();
  setStatus('idle', usbDevice ? 'Device connected. Select a firmware image.' : 'Ready — connect a device to begin.');
  logBox.innerHTML = '<div><span class="log-ts">[00:00:00]</span> <span class="log-info">Reset. Ready.</span></div>';
  document.getElementById('startAddr').value = '0x08000000';
  document.getElementById('timeout').value = '5000';
  document.getElementById('retries').value = '3';
  document.getElementById('dfuMode').value = 'normal';
  document.getElementById('transport').value = 'usb';
  document.getElementById('packetSize').value = '256';
  document.getElementById('verifyChk').checked = false;
  for (let i=0;i<5;i++) setStep(i,'');
  checkReady();
});
</script>
